name: Compilar Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - bpf111

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            bc bison build-essential flex git libelf-dev libssl-dev libncurses-dev clang llvm lld zip unzip python3 rsync

      - name: Preparar configuração base
        run: |
          # Aplica a alteração diretamente no arquivo de configuração base
          # Isso garante que a configuração seja lida corretamente pelo make defconfig
          sed -i 's/CONFIG_SECURITY_SELINUX_ENFORCE=y/CONFIG_SECURITY_SELINUX_ENFORCE=n/' arch/arm64/configs/exynos9820-m62xx_defconfig
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0" >> arch/arm64/configs/exynos9820-m62xx_defconfig

      - name: Gerar configuração
        run: |
          export ARCH=arm64
          export SUBARCH=arm64
          make exynos9820-m62xx_defconfig

      - name: Compilar Kernel
        run: |
          make -j$(nproc) \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1

      - name: Enviar Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/Image.gz
            arch/arm64/boot/Image.gz-dtb
            arch/arm64/boot/dtb
