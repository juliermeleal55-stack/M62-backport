name: Compilar Kernel

on:
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - bpf111

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Instalar dependências
        run: |
          sudo apt update
          sudo apt install -y \
            bc \
            bison \
            build-essential \
            cpio \
            curl \
            flex \
            git \
            libelf-dev \
            libssl-dev \
            lld \
            llvm \
            clang \
            python3 \
            unzip \
            zip \
            rsync

      - name: Limpar árvore
        run: |
          make mrproper

      - name: Gerar configuração
        run: |
          make ARCH=arm64 beyond2lte.config

      - name: Aplicar SELinux Permissivo
        run: |
          # Desativa a imposição do SELinux no arquivo .config gerado
          sed -i 's/CONFIG_SECURITY_SELINUX_ENFORCE=y/CONFIG_SECURITY_SELINUX_ENFORCE=n/' .config
          # Garante que o SELinux não será forçado a ligar
          echo "CONFIG_SECURITY_SELINUX_BOOTPARAM_VALUE=0" >> .config

      - name: Compilar Kernel
        run: |
          make -j$(nproc) \
            ARCH=arm64 \
            CC=clang \
            LLVM=1 \
            LLVM_IAS=1

      - name: Enviar Kernel
        uses: actions/upload-artifact@v4
        with:
          name: Kernel
          path: |
            arch/arm64/boot/Image
            arch/arm64/boot/Image.gz
            arch/arm64/boot
