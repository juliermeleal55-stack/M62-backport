name: Compilar Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar ferramentas
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu libc6-dev libssl-dev libncurses5-dev python3 unzip

      - name: Compilar Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Copia a config
          cp arch/arm64/configs/beyond2lte.config .config
          # Limpa dependências de root que não existem
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/CONFIG_KSU/d' .config
          # Atualiza a configuração automaticamente
          make olddefconfig
          # Torna o SELinux permissivo
          sed -i 's/CONFIG_SECURITY_SELINUX_ENFORCE=y/CONFIG_SECURITY_SELINUX_ENFORCE=n/' .config
          # Inicia a compilação ignorando erros de aviso (warnings)
          make -j$(nproc) KCFLAGS=-w
