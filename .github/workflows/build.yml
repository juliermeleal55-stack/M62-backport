name: Compilar Kernel

on:
  push:
    branches: [ "main" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-20.04 # Usando Ubuntu 20.04 (mais antigo e compatível)
    steps:
      - name: Baixar código
        uses: actions/checkout@v3

      - name: Instalar ferramentas
        run: |
          sudo apt-get update
          sudo apt-get install -y bc bison build-essential curl flex gcc-aarch64-linux-gnu libc6-dev libssl-dev libncurses5-dev python3 unzip

      - name: Compilar Kernel
        run: |
          export ARCH=arm64
          export CROSS_COMPILE=aarch64-linux-gnu-
          # Limpeza profunda
          make mrproper
          # Configuração
          cp arch/arm64/configs/beyond2lte.config .config
          sed -i '/kernelsu/d' drivers/Kconfig
          sed -i '/CONFIG_KSU/d' .config
          make olddefconfig
          # SELinux Permissivo
          sed -i 's/CONFIG_SECURITY_SELINUX_ENFORCE=y/CONFIG_SECURITY_SELINUX_ENFORCE=n/' .config
          # Compilação padrão (sem flags extras, pois o ambiente antigo deve aceitar o código original)
          make -j$(nproc)
